services:
  cuduck_dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuduck_dev
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - /dev/input:/dev/input
      - /run/udev:/run/udev:ro
    environment:
      - ROS_MASTER_URI=${ROS_MASTER_URI:-http://localhost:11311}
      - ROS_IP=${ROS_IP:-127.0.0.1}
      - ROS_HOSTNAME=${ROS_HOSTNAME:-localhost}
    command: bash
